<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biodata</title>
  <style>
    /* General styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #ffe4e1; /* Light pink background */
      color: #4a4a4a; /* Dark gray text */
    }

    /* Container */
    .container {
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff; /* White card */
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    /* Header */
    .header {
      text-align: center;
      padding-bottom: 20px;
    }

    .header h1 {
      font-size: 2rem;
      color: #ff69b4; /* Hot pink */
    }

    /* Profile Image */
    .profile-image {
      display: block;
      margin: 0 auto;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ff69b4; /* Hot pink border */
    }

    /* Biodata section */
    .biodata {
      margin-top: 20px;
    }

    .biodata h2 {
      color: #ff69b4;
      margin-bottom: 10px;
    }

    .biodata p {
      margin: 5px 0;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>My Biodata</h1>
      <img src="images/IMG_8348.HEIC" alt="Profile Image" class="profile-image">
    </div>
    <div class="biodata">
      <h2>Personal Information</h2>
      <p><strong>Name:</strong> Aisyah</p>
      <p><strong>Age:</strong> 20</p>
      <p><strong>Date of Birth:</strong> 18 April 2004</p>
      <p><strong>Hometown:</strong> Subang Jaya</p>
      <h2>Favorites</h2>
      <p><strong>Favorite Color:</strong> Pink</p>
      <p><strong>Favorite Food:</strong> Sweet things (cakes, muffins, cookies)</p>
      <p><strong>Favorite Drink:</strong> Matcha</p>
      <p><strong>Favorite Movie:</strong> Ipar Adalah Maut</p>
    </div>
    <div class="footer">
      <p>Stay healthy and keep growing 🌸</p>
    </div>
  </div>
</body>
</html>
