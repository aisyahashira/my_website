<html>
    <head>
        <title>Table</title>

    </head>

    <style>
        table, th, td
         {
            border: 1px solid black;
            border-collapse: collapse;

         }
        td
         {
            text-align: center;
            background-color: rgb(235, 132, 196);

         }
        th, td
         {
            padding: 20px;
         }

    </style>

    <body>

        <h1 align="center">Types of tables</h1>

        <table style="width: 70%;" align="center">

            <tr>
                <th>Name</th>
                <th>Matrics No</th>
                <th>Group</th>
            </tr>

            <tr>
                <td>Aisyah Ashira</td>

                <td>CDIM1105A</td>

            <tr>
                <td>Yeontan</td>
                <td>2022986734</td>
                <td>CDIM1105B</td>
            </tr>
        </table>
        <br>

        <table style="width: 100%;" align="center">
            <caption>Table 2: Table with </caption>
            <tr>
                <th>Name</th>
                <th colspan="2">Favourite</th>
            </tr>

            <tr>
                <td>Cah</td>
                <td>Information System</td>
                <td>Content Management</td>
            </tr>

        </table>
        <br>
        <table sytle="width: 70%;" align="center">

            </tr>

</html>
